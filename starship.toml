[fill]
symbol = ' '

[character]
format = "$symbol "
success_symbol = "[>](bold bright-yellow)"
error_symbol = "[Ō£Ś](italic purple)"
vimcmd_symbol = "[](italic dimmed green)"
# not supported in zsh
vimcmd_replace_one_symbol = ""
vimcmd_replace_symbol = ""
vimcmd_visual_symbol = ""

[env_var.VIMSHELL]
format = "[$env_value]($style)"
style = 'green italic'

[sudo]
format = "[$symbol]($style)"
style = "bold italic bright-purple"
symbol = " "
disabled = false

[username]
style_user = "bright-yellow bold italic"
style_root = "purple bold italic"
format = "[ $user]($style) "
disabled = false
show_always = false

[directory]
home_symbol = ""
truncation_length = 2
truncation_symbol = " "
read_only = " ¾░īŠ"
use_os_path_sep = true
style = "italic blue"
format = '[$path]($style)[$read_only]($read_only_style)'
repo_root_style = 'bold blue'
repo_root_format = '[$before_root_path]($before_repo_root_style)[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) [](bold bright-blue)'

[cmd_duration]
format = "\n[$duration ](italic white)\n"

[jobs]
format = "[$symbol$number]($style) "
style = "white"
symbol = "[](blue italic)"

[localip]
ssh_only = true
format = " [$localipv4](bold magenta)"
disabled = false

[time]
disabled = true
format = "[ $time]($style)"
time_format = "%R"
utc_time_offset = "local"
style = "italic dimmed white"

[battery]
disabled = true
format = "[ $percentage $symbol]($style)"
full_symbol = ""
charging_symbol = "[](italic bold green)"
discharging_symbol = ""
unknown_symbol = ""
empty_symbol = ""

[[battery.display]]
threshold = 20
style = "italic bold red"

[[battery.display]]
threshold = 60
style = "italic dimmed bright-purple"

[[battery.display]]
threshold = 70
style = "italic dimmed yellow"

[git_branch]
format = " [$symbol$branch(:$remote_branch)]($style)"
symbol = "’Éś "
style = "bright-blue"
truncation_symbol = "Ōŗ»"
truncation_length = 11
# ignore_branches = ["main", "master"]
only_attached = true

[git_commit]
tag_symbol = ' ’ÉÆ '

[git_metrics]
format = '( [+$added]($added_style))([-$deleted]($deleted_style))'
added_style = 'italic dimmed green'
deleted_style = 'italic dimmed bright-red'
ignore_submodules = true
disabled = false

[git_status]
style = "bold italic bright-blue"
format = "( [$ahead_behind$staged$modified$untracked$renamed$deleted$conflicted$stashed]($style))"
conflicted = "[ ŌŚ”](italic bright-magenta)"
ahead = "[Ōöé[${count}](bold white)Ōöé](italic green)"
behind = "[Ōöé[${count}](bold white)Ōöé](italic red)"
diverged = "[  Ōöż[${ahead_count}](regular white)Ōöé Ōöż[${behind_count}](regular white)Ōöé](italic bright-magenta)"
untracked = "[?ŌŚ”](italic bright-yellow)"
stashed = "[ ](italic white)"
modified = "[!ŌŚ”](italic yellow)"
staged = "[+[$count](bold white)](italic bright-cyan)"
renamed = "[┬╗ŌŚ”](italic bright-blue)"
deleted = "[](italic red)"

